{{ define "main" }}
<article class="album-single">
  <header>
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format "2006-01-02" }}</time>
  </header>
  <div class="album-images">
    {{ range .Params.images }}
    <figure>
      <img src="{{ . }}" alt="" loading="lazy">
    </figure>
    {{ end }}
  </div>
  <div class="album-description">
    {{ .Content }}
  </div>
</article>
{{ end }}
