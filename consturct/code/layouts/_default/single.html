{{ define "main" }}
<article class="single-content">
  <header>
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format "2006-01-02" }}</time>
    {{ with .Params.tags }}
    <div class="tags">
      {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
    {{ end }}
  </header>
  <div class="content-body">
    {{ .Content }}
  </div>
</article>
{{ partial "giscus.html" . }}
{{ end }}
